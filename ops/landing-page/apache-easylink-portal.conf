<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/easylink-portal

    <Directory /var/www/easylink-portal>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/easylink-portal-error.log
    CustomLog ${APACHE_LOG_DIR}/easylink-portal-access.log combined
</VirtualHost>
